configs:
  opensandbox-config:
    content: |
      [server]
      host = "0.0.0.0"
      port = 8090
      log_level = "DEBUG"

      [runtime]
      type = "docker"
      execd_image = "opensandbox/execd:v1.0.10"

      [egress]
      image = "opensandbox/egress:v1.0.6"

      [docker]
      network_mode = "bridge"
      host_ip = "host.docker.internal"
      pids_limit = 4096

      [ingress]
      mode = "direct"

services:
  opensandbox-server:
    image: opensandbox/server:latest
    container_name: opensandbox-server
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    configs:
      - source: opensandbox-config
        target: /etc/opensandbox/config.toml
    environment:
      - SANDBOX_CONFIG_PATH=/etc/opensandbox/config.toml
